name: Scrape listings

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-listings
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python dependencies
        run: pip install -r requirements.txt

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(pip show playwright | grep Version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # OS-level libs (libnss3 etc.) aren't covered by the cache above since
      # the runner VM is fresh every time - these still need installing each
      # run, but that's fast. The Chromium binary download is the slow part,
      # and that's what the cache above skips on a hit.
      - name: Install Playwright OS dependencies
        run: playwright install-deps chromium

      - name: Install Playwright browser binary
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated listings
        run: |
          git config user.name "manga-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add listings.json seen_items.json
          git diff --cached --quiet || git commit -m "Update listings [skip ci]"
          git pull --rebase origin main
          git push
