name: Scrape listings

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-listings
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python dependencies
        run: pip install -r requirements.txt

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(pip show playwright | grep Version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      # OS-level libs (libnss3 etc.) aren't covered by the cache above since
      # the runner VM is fresh every time - these still need installing each
      # run, but that's fast. The Chromium binary download is the slow part,
      # and that's what the cache above skips on a hit.
      - name: Install Playwright OS dependencies
        run: playwright install-deps chromium

      - name: Install Playwright browser binary
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run scraper
        run: python scraper.py

      # listings.json/seen_items.json are fully regenerated by the scraper
      # every run, not hand-edited, so there's nothing meaningful to lose by
      # preferring whichever run's snapshot lands last on a conflict - the
      # next run recreates them fresh either way. Runs firing close together
      # (every few minutes, taking a few minutes each) can otherwise race on
      # this step and fail outright; retrying with -X ours instead of a
      # plain rebase means a conflict here can't ever get stuck needing
      # manual resolution.
      - name: Commit updated listings
        run: |
          git config user.name "manga-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add listings.json seen_items.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update listings [skip ci]"

          for i in 1 2 3 4 5; do
            git fetch origin main
            if git merge -X ours --no-edit origin/main && git push origin HEAD:main; then
              echo "Pushed successfully on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying after backoff..."
            git merge --abort 2>/dev/null || true
            sleep $((5 + RANDOM % 10))
          done

          echo "All push attempts failed"
          exit 1
