name: Scrape listings

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-listings
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated listings
        run: |
          git config user.name "manga-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add listings.json seen_items.json
          git diff --cached --quiet || git commit -m "Update listings [skip ci]"
          git pull --rebase origin main
          git push
